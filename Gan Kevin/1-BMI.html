<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>1-BMI</title>
    </head>
    <h1>BMI計算</h1>
    <form>
        <div>
            <label for="height">身高：</label>
            <input
                type="number"
                name="height"
                id="height"
                placeholder="請輸入身高"
            />
        </div>
        <div>
            <label for="weight">體重：</label>
            <input
                type="number"
                name="weight"
                id="weight"
                placeholder="請輸入體重"
            />
        </div>
        <button type="button" onclick="bmi()">計算</button>
    </form>
    <p id="bmiResult"></p>
    <body>
        <script>
            //     讓使用者可以輸入自己的體重及身高，根據算出來的BMI值顯示下列訊息
            //     BMI = 體重(公斤)/身高(公尺)的平方
            //     BMI ＜ 18.5：過輕
            //     18.5≦BMI＜24：正常
            //     24≦BMI＜27：過重
            //     27≦BMI＜30：輕度肥胖
            //     30≦BMI＜35：中度肥胖
            //     BMI≧35：重度肥胖
            //
            const height = document.querySelector("#height");
            const weight = document.querySelector("#weight");
            const bmiResult = document.querySelector("#bmiResult");
            if (bmiResult.innerText == "") {
                bmiResult.innerText = "尚未輸入身高體重";
            }
            const bmi = () => {
                console.log(height.value);
                if (56 >= height.value || height.value >= 300) {
                    alert("身高輸入有誤");
                    height.value = "";
                    weight.value = "";
                    bmiResult.innerText == "";
                    return;
                }
                if (0 >= weight.value || weight.value >= 300) {
                    alert("體重輸入有誤");
                    height.value = "";
                    weight.value = "";
                    bmiResult.innerText == "";
                    return;
                }
                const bmiNumber = (
                    weight.value / Math.pow(height.value / 100, 2)
                ).toFixed(1);
                console.log(bmiNumber);
                if (bmiNumber < 18.5) {
                    bmiResult.innerText = "過輕";
                } else if (18.5 <= bmiNumber < 24) {
                    bmiResult.innerText = "正常";
                } else if (24 <= bmiNumber < 27) {
                    bmiResult.innerText = "過重";
                } else if (27 <= bmiNumber < 30) {
                    bmiResult.innerText = "輕度肥胖";
                } else if (30 <= bmiNumber < 35) {
                    bmiResult.innerText = "中度肥胖";
                } else if (35 <= bmiNumber) {
                    bmiResult.innerText = "重度肥胖";
                } else {
                    bmiResult.innerText = "輸入的數值有誤";
                }
            };
        </script>
    </body>
</html>
