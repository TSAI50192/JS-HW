<!DOCTYPE html>
<html lang="zh-tw">
    <head>
        <meta charset="UTF-8" />
        <title>11-密碼驗證</title>
    </head>
    <style>
        #idPwd {
            width: 250px;
        }
    </style>
    <body>
        <label>Password:</label>
        <input
            type="text  "
            id="idPwd"
            size="6"
        /><!-- 瀏覽器執行到此標籤會建立一個物件-->
        <span id="idsp"></span><br />
        <input
            type="button"
            id="idbut"
            value="checkPassword"
            onclick="checkPwd();"
        />

        <script>
            function checkPwd() {
                //取得idPwd元素
                const idPwd = document.querySelector("#idPwd");
                //取得idPwd元素值
                const idPwdValue = idPwd.value;
                //判斷元素值是否為空白，密碼長度是否大於6
                if (idPwdValue == "") {
                    console.log("當前密碼是空的");
                }
                if (idPwdValue.length > 8) {
                    console.log("密碼長度大於8");
                    const check = new RegExp(
                        /^(?=.*[A-Z])(?=.*[a-z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]+$/
                    );
                    const upperCase = new RegExp(/(?=.*[A-Z])/);
                    const lowerCase = new RegExp(/(?=.*[a-z])/);
                    const num = new RegExp(/(?=.*\d)/);
                    const special = new RegExp(/(?=.*[@$!%*?&])/);
                    if (!upperCase.test(idPwdValue)) {
                        console.log("密碼要包含至少一個大寫英文字母");
                    }
                    if (!lowerCase.test(idPwdValue)) {
                        console.log("密碼要包含至少一個小寫英文字母");
                    }
                    if (!num.test(idPwdValue)) {
                        console.log("密碼要包含至少一個數字");
                    }
                    if (!special.test(idPwdValue)) {
                        console.log("密碼要包含至少一個特殊符號");
                    }
                    if (check.test(idPwdValue)) {
                        console.log("密碼符合規範");
                    }
                } else {
                    console.log("密碼長度小於8");
                }
            }
        </script>
    </body>
</html>
