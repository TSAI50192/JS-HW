            // 6-改成function寫法
            const printTree = (num) => {
                let tree = "";
                for (i = 1; i <= num; i++) {
                    if (i <= num - 2) {
                        let space = "";
                        for (h = 1; h <= num - i; h++) {
                            space += " ";
                        }

                        let str = "";
                        for (j = 1; j <= 2 * i - 1; j++) {
                            str += "^";
                        }
                        tree += space + str + "\n";
                    }
                    if (i > num - 2) {
                        let space = "";
                        for (h = 1; h <= num - 1; h++) {
                            space += " ";
                        }

                        let str = "";
                        for (j = 1; j <= i; j++) {
                            str = "^";
                        }
                        tree += space + str + "\n";
                    }
                }
                console.log(tree);
            };
            printTree(10);
        </script>
