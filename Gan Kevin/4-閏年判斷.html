<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>4-閏年判斷</title>
    </head>
    <body>
        <h1>輸入西元年，判斷是否是閏年</h1>
        <form>
            <label for="bcNum ">請輸入西元年：</label>
            <input
                type="number"
                name="bcNum "
                id="bcNum"
                value=""
                placeholder="請輸入西元年 "
            />
            <button type="button" onclick="bcCheck()">確認</button>
        </form>
        <p id="outputText"></p>
        <script>
            const bcNum = document.querySelector("#bcNum");
            const outputText = document.querySelector("#outputText");
            const bcCheck = () => {
                if (Number(bcNum.value) % 400 == 0) {
                    outputText.innerText = `西元${bcNum.value}年是閏年`;
                    bcNum.value = "";
                    return;
                }
                if (
                    Number(bcNum.value) % 4 == 0 &&
                    Number(bcNum.value) % 100 !== 0
                ) {
                    outputText.innerText = `西元${bcNum.value}年是閏年`;
                    bcNum.value = "";
                    return;
                }
                if (Number(bcNum.value) % 4 !== 0) {
                    outputText.innerText = `西元${bcNum.value}年是平年，並非閏年`;
                    bcNum.value = "";
                    return;
                }
                if (
                    Number(bcNum.value) % 100 == 0 &&
                    Number(bcNum.value) % 400 !== 0
                ) {
                    outputText.innerText = `西元${bcNum.value}年是平年，並非閏年`;
                    bcNum.value = "";
                    return;
                }
            };
        </script>
    </body>
</html>
