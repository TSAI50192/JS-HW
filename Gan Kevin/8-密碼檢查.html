<!DOCTYPE html>
<html lang="zh-tw">
    <head>
        <meta charset="UTF-8" />
        <title>8-密碼檢查</title>
    </head>
    <body>
        <label>Password:</label>
        <input
            type="password"
            id="idPwd"
            size="6"
        /><!-- 瀏覽器執行到此標籤會建立一個物件-->
        <span id="idsp"></span><br />
        <input
            type="button"
            id="idbut"
            value="checkPassword"
            onclick="checkPwd();"
        />

        <script>
            function checkPwd() {
                //取得idPwd元素
                const idPwd = document.querySelector("#idPwd");
                //取得idPwd元素值
                const idPwdValue = idPwd.value;
                //判斷元素值是否為空白，密碼長度是否大於6
                if (idPwdValue == "") {
                    console.log("當前密碼是空的");
                }
                if (idPwdValue.length > 6) {
                    console.log("密碼長度大於6");
                    //如果長度是否大於6，判斷是否包含字母、數字、特殊符號
                    const alphabet = new RegExp("[a-zA-Z]");
                    const number = new RegExp("[0-9]");
                    const special = new RegExp(
                        "[`~!@#$^&*()=|{}':;',\\[\\].<>《》/?~！@#￥……&*（）——|{}【】‘；：”“'。，、？ ]"
                    );
                    if (alphabet.test(idPwdValue)) {
                        console.log("密碼有包含字母");
                    }
                    if (number.test(idPwdValue)) {
                        console.log("密碼有包含數字");
                    }
                    if (special.test(idPwdValue)) {
                        console.log("密碼有包含特殊符號");
                    }
                } else {
                    console.log("密碼長度小於6");
                }
            }
        </script>
    </body>
</html>
