<!DOCTYPE html>
<html lang="zh-tw">
    <head>
        <meta charset="UTF-8" />
        <title>9-電子郵件檢查</title>
    </head>
    <body>
        <label>Email:</label>
        <input
            type="email"
            id="idEmail"
            size="6"
        /><!-- 瀏覽器執行到此標籤會建立一個物件-->
        <span id="idsp"></span><br />
        <input
            type="button"
            id="idbut"
            value="checkEmail"
            onclick="checkEmail();"
        />

        <script>
            function checkEmail() {
                const idEmail = document.querySelector("#idEmail");
                const emailMouse = new RegExp(/\@/);
                const emailPoint = new RegExp(/\./);
                const emailTwoMouse = new RegExp(/@.*@/);

                if (emailTwoMouse.test(idEmail.value)) {
                    console.log("@不能重複");
                    return;
                }

                if (
                    emailMouse.test(idEmail.value) &&
                    emailPoint.test(idEmail.value)
                ) {
                    console.log("密碼有包含@.");
                    return;
                }

                if (emailMouse.test(idEmail.value)) {
                    console.log("密碼只有包含@");
                    return;
                }

                if (emailPoint.test(idEmail.value)) {
                    console.log("密碼只有包含.");
                    return;
                }
            }
        </script>
    </body>
</html>
